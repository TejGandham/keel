services:
  app:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - ./repo_man:/app
      - ${REPOMAN_SHRED_PATH:-/mnt/agent-storage/vader/src}:/shred
      - ./.git-credentials:/root/.git-credentials:ro
    environment:
      - REPOMAN_PATH=/shred
      - REPOMAN_HOST_PATH=${REPOMAN_SHRED_PATH:-/mnt/agent-storage/vader/src}
      - PHX_HOST=localhost
      - GIT_TERMINAL_PROMPT=0
    stdin_open: true
    tty: true
